server.port=8080

spring.application.name=library-service

# domain-service base URL (override via env var for Docker/Compose/k8s)
services.domain-service.base-url=${DOMAIN_SERVICE_URL:http://localhost:8081}

# JWT - override JWT_SECRET via env var in any real deployment; this default is for local dev only.
security.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-of-at-least-32-bytes-please}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# CORS - the Angular dev server runs on :4200 by default. Comma-separated list; override
# CORS_ALLOWED_ORIGINS for staging/prod frontend URLs.
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info

spring.threads.virtual.enabled=true

logging.level.com.libraryapp.library=INFO
logging.level.root=DEBUG
